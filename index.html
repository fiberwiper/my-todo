<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>My ToDo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f7;
      color: #1c1c1e;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ログイン画面 */
    #login-screen {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
    }
    #login-screen h1 { font-size: 2rem; }
    #login-screen p { color: #666; }
    .btn-google {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 24px;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 12px;
      font-size: 1rem;
      cursor: pointer;
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }

    /* メイン画面 */
    #app { display: none; flex: 1; flex-direction: column; overflow: hidden; }
    #app.active { display: flex; }

    header {
      background: #fff;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #e5e5ea;
      flex-shrink: 0;
    }
    header h1 { font-size: 1.1rem; font-weight: 700; }
    .btn-logout {
      background: none;
      border: none;
      color: #ff3b30;
      font-size: 0.9rem;
      cursor: pointer;
    }

    /* リストタブ */
    #list-tabs {
      display: flex;
      overflow-x: auto;
      background: #fff;
      border-bottom: 1px solid #e5e5ea;
      flex-shrink: 0;
      scrollbar-width: none;
    }
    #list-tabs::-webkit-scrollbar { display: none; }
    .list-tab {
      padding: 10px 16px;
      border: none;
      background: none;
      font-size: 0.9rem;
      cursor: pointer;
      white-space: nowrap;
      border-bottom: 2px solid transparent;
      color: #666;
      flex-shrink: 0;
    }
    .list-tab.active {
      border-bottom-color: #007aff;
      color: #007aff;
      font-weight: 600;
    }
    .list-tab-add {
      padding: 10px 14px;
      border: none;
      background: none;
      font-size: 1.3rem;
      cursor: pointer;
      color: #007aff;
      flex-shrink: 0;
    }

    /* タスク一覧 */
    #task-list {
      flex: 1;
      overflow-y: auto;
    }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #aaa;
      line-height: 1.8;
    }
    .task-item {
      display: flex;
      align-items: center;
      padding: 14px 16px;
      background: #fff;
      border-bottom: 1px solid #f0f0f0;
      gap: 12px;
    }
    .task-check {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 2px solid #c7c7cc;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.85rem;
      transition: all 0.15s;
    }
    .task-check.done {
      background: #34c759;
      border-color: #34c759;
      color: #fff;
    }
    .task-text {
      flex: 1;
      font-size: 1rem;
      line-height: 1.4;
      word-break: break-all;
    }
    .task-text.done {
      text-decoration: line-through;
      color: #aaa;
    }
    .task-delete {
      background: none;
      border: none;
      color: #c7c7cc;
      font-size: 1.3rem;
      cursor: pointer;
      padding: 4px;
      line-height: 1;
      flex-shrink: 0;
    }

    /* 入力エリア */
    #input-area {
      display: flex;
      gap: 8px;
      padding: 10px 12px;
      background: #fff;
      border-top: 1px solid #e5e5ea;
      flex-shrink: 0;
    }
    #task-input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #e5e5ea;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      background: #f5f5f7;
    }
    #task-input:focus { border-color: #007aff; background: #fff; }
    #add-btn {
      padding: 10px 18px;
      background: #007aff;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
    }
    #add-btn:active { opacity: 0.8; }
  </style>
</head>
<body>

<div id="login-screen">
  <h1>📋 My ToDo</h1>
  <p>Googleアカウントでログインして始めよう</p>
  <button class="btn-google" id="login-btn">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20" alt="">
    Googleでログイン
  </button>
</div>

<div id="app">
  <header>
    <h1>My ToDo</h1>
    <button class="btn-logout" id="logout-btn">ログアウト</button>
  </header>

  <div id="list-tabs">
    <button class="list-tab-add" id="add-list-btn" title="リストを追加">＋</button>
  </div>

  <div id="task-list">
    <div class="empty-state">タスクがありません<br>下から追加しよう</div>
  </div>

  <div id="input-area">
    <input type="text" id="task-input" placeholder="タスクを追加...">
    <button id="add-btn">追加</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
  import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc, query, orderBy, serverTimestamp }
    from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAwY2Lvq4SVID92r2iWA1J7Xpbl3xFQsBA",
    authDomain: "myohondriver.firebaseapp.com",
    projectId: "myohondriver",
    storageBucket: "myohondriver.firebasestorage.app",
    messagingSenderId: "542945453791",
    appId: "1:542945453791:web:348ba9cd52049c9f0ceb6a"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);
  const provider = new GoogleAuthProvider();

  let currentUser = null;
  let currentListId = null;
  let unsubscribeTasks = null;
  let unsubscribeLists = null;
  let allTasks = [];

  // ログイン
  document.getElementById('login-btn').onclick = () => {
    signInWithPopup(auth, provider).catch(err => alert('ログインに失敗しました: ' + err.message));
  };

  // ログアウト
  document.getElementById('logout-btn').onclick = () => {
    if (confirm('ログアウトしますか？')) signOut(auth);
  };

  // 認証状態の監視
  onAuthStateChanged(auth, user => {
    currentUser = user;
    if (user) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('app').classList.add('active');
      startListening();
    } else {
      document.getElementById('login-screen').style.display = 'flex';
      document.getElementById('app').classList.remove('active');
      if (unsubscribeLists) unsubscribeLists();
      if (unsubscribeTasks) unsubscribeTasks();
      currentListId = null;
      allTasks = [];
    }
  });

  function startListening() {
    const listsRef = collection(db, 'users', currentUser.uid, 'lists');
    unsubscribeLists = onSnapshot(query(listsRef, orderBy('createdAt')), snapshot => {
      const lists = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));

      if (lists.length === 0) {
        addDoc(listsRef, { name: '仕事', createdAt: serverTimestamp() });
        addDoc(listsRef, { name: '趣味', createdAt: serverTimestamp() });
        return;
      }

      if (!currentListId || !lists.find(l => l.id === currentListId)) {
        currentListId = lists[0].id;
      }

      renderListTabs(lists);
      renderTasks();
    });

    const tasksRef = collection(db, 'users', currentUser.uid, 'tasks');
    unsubscribeTasks = onSnapshot(query(tasksRef, orderBy('createdAt')), snapshot => {
      allTasks = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
      renderTasks();
    });
  }

  function renderListTabs(lists) {
    const container = document.getElementById('list-tabs');
    container.querySelectorAll('.list-tab').forEach(el => el.remove());
    const addBtn = document.getElementById('add-list-btn');

    lists.forEach(list => {
      const tab = document.createElement('button');
      tab.className = 'list-tab' + (list.id === currentListId ? ' active' : '');
      tab.dataset.listId = list.id;
      tab.textContent = list.name;
      tab.onclick = () => {
        currentListId = list.id;
        document.querySelectorAll('.list-tab').forEach(t => t.classList.toggle('active', t.dataset.listId === list.id));
        renderTasks();
      };
      tab.oncontextmenu = e => { e.preventDefault(); editOrDeleteList(list); };
      container.insertBefore(tab, addBtn);
    });
  }

  function renderTasks() {
    const container = document.getElementById('task-list');
    const tasks = allTasks.filter(t => t.listId === currentListId);
    container.innerHTML = '';

    if (tasks.length === 0) {
      container.innerHTML = '<div class="empty-state">タスクがありません<br>下から追加しよう</div>';
      return;
    }

    tasks.forEach(task => {
      const item = document.createElement('div');
      item.className = 'task-item';

      const check = document.createElement('div');
      check.className = 'task-check' + (task.done ? ' done' : '');
      check.textContent = task.done ? '✓' : '';
      check.onclick = () => updateDoc(doc(db, 'users', currentUser.uid, 'tasks', task.id), { done: !task.done });

      const text = document.createElement('span');
      text.className = 'task-text' + (task.done ? ' done' : '');
      text.textContent = task.text;

      const del = document.createElement('button');
      del.className = 'task-delete';
      del.textContent = '×';
      del.onclick = () => {
        if (confirm('削除しますか？')) deleteDoc(doc(db, 'users', currentUser.uid, 'tasks', task.id));
      };

      item.append(check, text, del);
      container.appendChild(item);
    });
  }

  async function addTask() {
    const input = document.getElementById('task-input');
    const text = input.value.trim();
    if (!text || !currentListId) return;
    input.value = '';
    await addDoc(collection(db, 'users', currentUser.uid, 'tasks'), {
      text, listId: currentListId, done: false, createdAt: serverTimestamp()
    });
  }

  document.getElementById('add-list-btn').onclick = () => {
    const name = prompt('リスト名を入力してください');
    if (name && name.trim()) {
      addDoc(collection(db, 'users', currentUser.uid, 'lists'), { name: name.trim(), createdAt: serverTimestamp() });
    }
  };

  function editOrDeleteList(list) {
    const action = prompt(`「${list.name}」\n\n1 → 名前を変更\n2 → 削除\n\n番号を入力してください`);
    if (action === '1') {
      const name = prompt('新しいリスト名:', list.name);
      if (name && name.trim()) updateDoc(doc(db, 'users', currentUser.uid, 'lists', list.id), { name: name.trim() });
    } else if (action === '2') {
      if (confirm(`「${list.name}」を削除しますか？\n（タスクは残ります）`)) {
        deleteDoc(doc(db, 'users', currentUser.uid, 'lists', list.id));
      }
    }
  }

  document.getElementById('add-btn').onclick = addTask;
  document.getElementById('task-input').addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });
</script>
</body>
</html>
